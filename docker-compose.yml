services:
  alldevice-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    environment:
      ALLDEVICE_API_BASE_URL: ${ALLDEVICE_API_BASE_URL}
      ALLDEVICE_USERNAME: ${ALLDEVICE_USERNAME}
      ALLDEVICE_PASSWORD: ${ALLDEVICE_PASSWORD}
      ALLDEVICE_API_KEY: ${ALLDEVICE_API_KEY}
      ALLDEVICE_DOWNTIME_PATH: ${ALLDEVICE_DOWNTIME_PATH:-/api/downtimes/list}
      ALLDEVICE_TASKREPORTS_PATH: ${ALLDEVICE_TASKREPORTS_PATH:-/api/taskreports/list}
      DEFAULT_DATE_START: ${DEFAULT_DATE_START:-2023-01-01}
      DEFAULT_DATE_END: ${DEFAULT_DATE_END:-2026-12-31}
      TASKREPORTS_DATE_TYPE: ${TASKREPORTS_DATE_TYPE:-completed_date}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-lv}
      PORT: ${PORT:-8010}
    restart: unless-stopped
